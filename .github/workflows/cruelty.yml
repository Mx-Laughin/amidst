name: cruelty
on:
  push:
    branches: [ "main" ]

jobs:
    without_psst:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 20
            
        - name: without_psst
          run: |
            npm install
            timeout 344m node cruelty.js
  
