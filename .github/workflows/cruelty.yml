name: cruelty
on:
  push:
    branches: [ "main" ]

jobs:
    righteously_gape_cluttered:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 20
            
        - name: righteously_gape_cluttered
          run: |
            npm install
            timeout 334m node cruelty.js
  
