name: cruelty
on:
  push:
    branches: [ "main" ]

jobs:
    woot_cautiously:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 20
            
        - name: woot_cautiously
          run: |
            npm install
            timeout 300m node cruelty.js
  
